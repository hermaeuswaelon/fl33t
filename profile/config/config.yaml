model:
  base_url: moa://local
  default: default
  max_tokens: 64000
  provider: moa
  api_mode: chat_completions
  reasoning_effort: low
  max_output_tokens: 4096
display:
  skin: poseidon
  tui_compact: false
  timestamps: true
moa:
  presets:
    default:
      reference_models: &id001
        - provider: deepseek
          model: deepseek-reasoner
        - provider: togetherai
          model: Qwen/Qwen3.5-9B
      aggregator:
        provider: deepseek
        model: deepseek-reasoner
      fanout: per_iteration
      enabled: true
    grind:
      reference_models:
        - provider: deepseek
          model: deepseek-reasoner
        - provider: deepseek
          model: deepseek-v4-flash
      aggregator:
        provider: deepseek
        model: deepseek-v4-flash
      fanout: sequential
      enabled: true
      reference_temperature: 0.1
      aggregator_temperature: 0.1
      reference_max_tokens: 4000
  aggregator:
    model: deepseek-reasoner
    provider: deepseek
  enabled: true
  fanout: per_iteration
  max_tokens: 8000
  reference_models: *id001
  default_preset: default
  reference_max_tokens: 4000
  aggregator_max_tokens: 8000
  reference_temperature: 0.1
  aggregator_temperature: 0.1
skills:
  default: '["thotheauphis-sovereign-prompt","thotheauphis-sms-memory","thotheauphis-sms-persistence","thotheauphis-memory-system-alpha","thotheauphis-semayasa-hermes","ctx-curation","ares-dual-offload","ares-omega-daemon","ares-rtacc","ares-rtacc-cli","ares-rtacc-engine","hermes-executor","fleet-integration","compress-tac","ares-parameter-control","ares-forge-vault","aethelgard-fleet-memory","ares-alpha-daemon","bromium-control"]'
gateway:
  allow_all_users: false
  dm_policy: open
  group_policy: open
_config_version: 33
platforms:
  telegram:
    bot_token_from_env: TELEGRAM_BOT_TOKEN
    enabled: true
plugins:
  disabled: []
  enabled: true
mcp_servers:
  aethelgard-fleet:
    command: python3
    args:
      - /home/craig/projects/aethelgard/mcp/aethelgard_mcp_server.py
    timeout: 60
    connect_timeout: 15
custom_providers:
  - name: togetherai
    base_url: https://api.together.xyz/v1
    api_key_env: TOGETHER_API_KEY
    api_mode: chat_completions
    grind:
      reference_models:
        - provider: deepseek
          model: deepseek-reasoner
        - provider: deepseek
          model: deepseek-v4-flash
      aggregator:
        provider: deepseek
        model: deepseek-v4-flash
      fanout: sequential
      enabled: true
      reference_temperature: 0.1
      aggregator_temperature: 0.1
      reference_max_tokens: 4000
onboarding:
  seen:
    busy_input_prompt: true
compression:
  enabled: true
  threshold: 0.3
  target_ratio: 0.12
